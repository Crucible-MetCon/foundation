services:
  postgres:
    image: postgres:16-alpine
    container_name: foundation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: foundation
      POSTGRES_PASSWORD: foundation
      POSTGRES_DB: foundation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
