[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/web/**", "packages/**", "Dockerfile", "pnpm-lock.yaml"]

[deploy]
# No startCommand — use the Dockerfile CMD (node apps/web/server.js)
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
